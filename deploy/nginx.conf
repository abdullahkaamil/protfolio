# /etc/nginx/sites-available/akaamil.com
# Static site for akaamil.com — served straight from the cloned git repo.

server {
    listen 80;
    listen [::]:80;
    server_name akaamil.com www.akaamil.com;

    # Web root = the cloned repository directory
    root /var/www/akaamil;
    index index.html;

    # Serve files directly; fall back to index.html, then 404
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Never expose the .git directory, .claude, or other dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Long cache for static assets (they rarely change)
    location ~* \.(?:css|js|png|jpe?g|webp|svg|ico|woff2?|ttf|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # HTML should revalidate so deploys show up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/akaamil.access.log;
    error_log  /var/log/nginx/akaamil.error.log;
}
